) {

if (

// 🔥 หา position
const queuePosition =

// 🔥 ถ้า user อยู่ใน queue
if (queuePosition !== -1) {

  ) {

window.startMachine = async function(machineId) {

  const { data: machineData } =
  await supabase
    .from('machine')
    .select('*')
    .eq('id', machineId)
    .single()

let queue = []

if (
  machineData.queue &&
  machineData.queue !== ""
) {

  queue =
    machineData.queue.split(',')

}

// 🔥 ถ้าเป็นคนที่ถูกเรียก
if (
  machineData.current_queue_user ===
  userId
) {

  queue.shift()

}

// 🔥 ถ้ามีคนถูกเรียกคิว
if (
  machineData.current_queue_user
  &&
  machineData.current_queue_user
    !== userId
) {

  alert(
    "This machine is reserved for the next queue."
  )

  return

}
  // 🔥 อ่านค่าจาก input
  const minutes =
    document.getElementById(`minutesInput-${machineId}`).value

  // 🔥 ถ้ายังไม่กรอก
  if (!minutes) {

    alert("Please enter minutes")

    return
  }

  // 🔥 คำนวณเวลาสิ้นสุด
  const endTime =
    Date.now() + (minutes * 60 * 1000)

  // 🔥 เปลี่ยน status บนเว็บ
  document.getElementById(`status-${machineId}`).innerHTML =
    `🟡 In Use Remaining : (${minutes} min)
    <br><br>

<button
  onclick="finishEarly(${machineId})"
>
  Machine Finished Early
</button>`

  // 🔥 save ลง Supabase
  const { data, error } =
    await supabase
      .from('machine')
      .update({
      status: 'In Use',
      end_time: endTime,
      queue: queue.join(','),
      owner: userId,
      queue_called_at: null,
      extended_minutes: null,
      current_queue_user: null,
      finished_at: null
})
      .eq('id', machineId)

  console.log(data)
  console.log(error)
  startCountdown(machineId, endTime)  
  
  
  // 🔥 popup
  alert("Machine Started!")

}

window.pickedUp =

    clearInterval(
  timers[machineId]
)
delete timers[machineId]

  extendUI[machineId] = false

  const { data: machineData } =
    await supabase

      .select('*')
      .eq('id', machineId)
      .single()

  if (
    machineData.queue &&
    machineData.queue !== ""
  ) {

    queue =
      machineData.queue.split(',')

  // 🔥 มี queue

      queue[0]

    const { data, error } =
      await supabase
        .from('machine')
        .update({


          status: 'Available',
          end_time: null,
          finished_at: null,
          owner: null,

            machineData.queue,

        })

        await fetch(

)

window.extendMachine = async function(machineId) {

  const minutes =
    document.getElementById(
      `extendInput-${machineId}`
    ).value

  if (!minutes) return

  const extraMinutes =
    parseInt(minutes)

  const newEndTime =
    Date.now() +
    (extraMinutes * 60 * 1000)

  const { data, error } =
    await supabase
      .from('machine')
      .update({
        status: 'In Use',
        end_time: newEndTime,
        extended_minutes: extraMinutes,
        finished_at: Date.now()
      })
      .eq('id', machineId)

  console.log(data)
  console.log(error)

}

      .eq('id', machineId)

)

window.joinQueue =
  async function(machineId) {

  const { data: machineData } =
    await supabase
      .from('machine')
      .select('*')
      .eq('id', machineId)
      .single()

  let queue = []


  // 🔥 ถ้ามี queue เดิม
  if (machineData.queue) {

    queue =
      machineData.queue.split(',')

  }

  if (
  machineData.owner === userId
  &&
  queue.length === 0
) {

  alert(
    "You cannot queue your own machine unless someone is already waiting."
  )

  return

}

  // 🔥 กัน join ซ้ำ
  if (queue.includes(userId)) {

    alert("Already in queue")

    return

  }

  // 🔥 จำนวนคนก่อนหน้า
  const peopleAhead =
    queue.length

  // 🔥 confirm
  const confirmed =
    confirm(
      `There are ${peopleAhead} people ahead of you.\n\nConfirm queue?`
    )

  if (!confirmed) return

  // 🔥 เพิ่มเข้าคิว
  queue.push(userId)

  // 🔥 save
  const { data, error } =
    await supabase
      .from('machine')
      .update({
        queue: queue.join(',')
      })
      .eq('id', machineId)

  console.log(data)
  console.log(error)

}

window.showExtend = function(machineId) {

  extendUI[machineId] = true

  loadStatus()

}

await renderMachines()

loadStatus()


setInterval(async () => {

  const { data } =
    await supabase
      .from('machine')
      .select('*')

  if (!data) return

  data.forEach(async machine => {

    // 🔥 ต้องมีคนถูกเรียก
    if (
      !machine.current_queue_user
    ) return

    // 🔥 ต้องมีเวลาเรียก
    if (
      !machine.queue_called_at
    ) return

    const now = Date.now()

// 🔥 machine ต้องยัง Available
if (
  machine.status !== "Available"
) return

    const elapsed =
      now - machine.queue_called_at

    // 🔥 เกิน 5 นาที
    if (
      elapsed >=
      5 * 60 * 1000
    ) {

      let queue = []

      if (
        machine.queue &&
        machine.queue !== ""
      ) {

        queue =
          machine.queue.split(',')

      }

      // 🔥 remove คนปัจจุบัน
      queue.shift()

      await fetch(
  "https://hjeeirnzsihqdetikebw.supabase.co/functions/v1/dynamic-processor",
  {
    method: "POST",
    
    headers: {
      "Content-Type":
        "application/json"
    },

    
    body: JSON.stringify({

  userId:
  machine.current_queue_user,

  message:
    `⌛ Queue expired`

})
  }
)

      // 🔥 ยังมี queue ต่อ
      if (queue.length > 0) {

        const nextUser =
          queue[0]

        await supabase
          .from('machine')
          .update({

            current_queue_user:
              nextUser,

            queue:
              queue.join(','),

            queue_called_at:
              Date.now()

          })
          .eq('id', machine.id)

          await fetch(
  "https://hjeeirnzsihqdetikebw.supabase.co/functions/v1/dynamic-processor",
  {
    method: "POST",

    mode: "cors",

    headers: {
      "Content-Type":
        "application/json"
    },

    
    body: JSON.stringify({

  userId:
  nextUser,

  message:
    `🔔 It's your turn now`

})
  }
)
      }

      // 🔥 ไม่มี queue แล้ว
      else {

        await supabase
          .from('machine')
          .update({

            current_queue_user:
              null,

            queue:
              "",

            queue_called_at:
              null

          })
          .eq('id', machine.id)

      }

    }

  })

}, 30000)

supabase
  .channel('machines')

  .on(
    'postgres_changes',
    {
      event: '*',
      schema: 'public',
      table: 'machine'
    },

    async payload => {

       console.log(payload)

       loadStatus()

    }
  )

  .subscribe()

  
</script>
